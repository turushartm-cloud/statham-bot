services:
  # ── Statham Bot (основной) ────────────────────────────────────────────────────
  - type: web
    name: statham-bot
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -c gunicorn_config.py

    envVars:
      # ── Telegram ──────────────────────────────────────────────────
      - key: TG_TOKEN
        sync: false
      - key: TG_CHAT
        sync: false
      - key: TG_SIGNALS_TOPIC
        value: "6314"
      - key: TG_SESSIONS_TOPIC
        value: "6314"
      - key: TG_TOPIC
        value: "6314"

      # ── Render ────────────────────────────────────────────────────
      - key: RENDER_URL
        sync: false

      # ── Bybit ─────────────────────────────────────────────────────
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_API_SECRET
        sync: false
      - key: TESTNET
        value: "false"
      - key: BYBIT_PAIRS
        value: ""

      # ── BingX ─────────────────────────────────────────────────────
      - key: BINGX_API_KEY
        sync: false
      - key: BINGX_API_SECRET
        sync: false
      - key: BINGX_DEMO
        value: "true"
      - key: BINGX_PAIRS
        value: "PUFFERUSDT,ATOMUSDT,EDGEUSDT,STOUSDT,FARTCOINUSDT,WLDUSDT,ASTERUSDT,UNIUSDT,SIRENUSDT,BLESSUSDT,ARCUSDT,HANAUSDT,GPSUSDT,RIVERUSDT,YBUSDT,1000PEPEUSDT,XVSUSDT,TRADOORUSDT,ZBTUSDT,CLOUSDT,KOMAUSDT,WIFUSDT,BANANAS31USDT,POPCATUSDT,NILUSDT,LABUSDT,ZECUSDT,IOUSDT,VIRTUALUSDT,DOTUSDT,ONDOUSDT,TIAUSDT,ENAUSDT,HAEDALUSDT,VELVETUSDT,GMTUSDT,ETHUSDT,HBARUSDT,SUIUSDT,DOGEUSDT,KAITOUSDT"

      - key: ALLOWED_PAIRS
        value: "PUFFERUSDT,ATOMUSDT,ASTERUSDT,EDGEUSDT,STOUSDT,UNIUSDT,SIRENUSDT,FARTCOINUSDT,WLDUSDT,ZBTUSDT,BLESSUSDT,ARCUSDT,RIVERUSDT,HANAUSDT,GPSUSDT,YBUSDT,1000PEPEUSDT,XVSUSDT,TRADOORUSDT,CLOUSDT,KOMAUSDT,WIFUSDT,BANANAS31USDT,POPCATUSDT,NILUSDT,LABUSDT,ZECUSDT,IOUSDT,VIRTUALUSDT,DOTUSDT,ONDOUSDT,TIAUSDT,ENAUSDT,HAEDALUSDT,VELVETUSDT,GMTUSDT,ETHUSDT,HBARUSDT,SUIUSDT,DOGEUSDT,KAITOUSDT"

      - key: ADMIN_IDS
        sync: false
      - key: DEFAULT_LEVERAGE
        value: "20"
      - key: DEFAULT_SIZE_USDT
        value: "5"
      - key: TRAIL_PCT
        value: "0.0"
      - key: PAIR_SETTINGS_JSON
        sync: false
      - key: DATA_DIR
        value: "/tmp"
      - key: REDIS_URL
        sync: false

  # ── Statham Dashboard (дашборд) ──────────────────────────────────────────────
  - type: web
    name: statham-dashboard
    runtime: python
    pythonVersion: "3.11.9"
    rootDir: dashboard
    buildCommand: pip install flask requests redis gunicorn
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 60

    envVars:
      # ── ОБЯЗАТЕЛЬНО: тот же Redis что и у бота ────────────────────
      - key: REDIS_URL
        sync: false          # rediss://default:...@....upstash.io:6379

      # ── Доступ к дашборду ─────────────────────────────────────────
      - key: DASHBOARD_SECRET
        generateValue: true  # Render сгенерирует случайный токен — скопируй в URL

      # ── Telegram алерты (опционально) ────────────────────────────
      - key: TG_TOKEN
        sync: false          # тот же токен бота
      - key: TG_ADMIN_ID
        value: "7617558315"  # твой Telegram user_id (личка бота)

      # ── P&L порог алерта ─────────────────────────────────────────
      - key: PNL_ALERT_THRESHOLD
        value: "-5.0"        # слать алерт если today P&L ≤ -5%
